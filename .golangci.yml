version: "2"

linters:
  default: standard
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocritic
    - revive
    - bodyclose
    - misspell
  exclusions:
    paths:
      - third_party
      - plugins/proto

formatters:
  enable:
    - gofmt
    - goimports
