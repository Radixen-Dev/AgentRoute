<svg viewBox="0 0 760 185" xmlns="http://www.w3.org/2000/svg" width="100%" role="img" aria-label="AgentRoute architecture diagram">
  <title>AgentRoute architecture: Claude Code → AgentRoute gateway → LiteLLM sidecar → OpenRouter</title>

  <defs>
    <!-- Open-chevron arrowhead, 8×10 in user-space units -->
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="1,1 8,5 1,9"
                fill="none" stroke="#41D6C3" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="185" rx="12" fill="#0F1419"/>

  <!-- Connecting arrows (drawn first — node fills cover the source ends) -->
  <!-- Claude Code → AgentRoute -->
  <line x1="100" y1="90" x2="255" y2="90"
        stroke="#41D6C3" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- AgentRoute → LiteLLM -->
  <line x1="290" y1="90" x2="445" y2="90"
        stroke="#41D6C3" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- LiteLLM → OpenRouter -->
  <line x1="480" y1="90" x2="635" y2="90"
        stroke="#41D6C3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─────────────────────────────────────────────
       NODE 1 — Claude Code
  ───────────────────────────────────────────── -->
  <circle cx="100" cy="90" r="35" fill="#0F1419" stroke="#41D6C3" stroke-width="1.5"/>
  <!-- Anthropic/Claude icon — Simple Icons 24×24, scaled to 40 px, centered at (100,90) -->
  <g transform="translate(80,70) scale(1.667)" fill="#41D6C3">
    <path d="m4.7144 15.9555 4.7174-2.6471.079-.2307-.079-.1275h-.2307l-.7893-.0486-2.6956-.0729-2.3375-.0971-2.2646-.1214-.5707-.1215-.5343-.7042.0546-.3522.4797-.3218.686.0608 1.5179.1032 2.2767.1578 1.6514.0972 2.4468.255h.3886l.0546-.1579-.1336-.0971-.1032-.0972L6.973 9.8356l-2.55-1.6879-1.3356-.9714-.7225-.4918-.3643-.4614-.1578-1.0078.6557-.7225.8803.0607.2246.0607.8925.686 1.9064 1.4754 2.4893 1.8336.3643.3035.1457-.1032.0182-.0728-.164-.2733-1.3539-2.4467-1.445-2.4893-.6435-1.032-.17-.6194c-.0607-.255-.1032-.4674-.1032-.7285L6.287.1335 6.6997 0l.9957.1336.419.3642.6192 1.4147 1.0018 2.2282 1.5543 3.0296.4553.8985.2429.8318.091.255h.1579v-.1457l.1275-1.706.2368-2.0947.2307-2.6957.0789-.7589.3764-.9107.7468-.4918.5828.2793.4797.686-.0668.4433-.2853 1.8517-.5586 2.9021-.3643 1.9429h.2125l.2429-.2429.9835-1.3053 1.6514-2.0643.7286-.8196.85-.9046.5464-.4311h1.0321l.759 1.1293-.34 1.1657-1.0625 1.3478-.8804 1.1414-1.2628 1.7-.7893 1.36.0729.1093.1882-.0183 2.8535-.607 1.5421-.2794 1.8396-.3157.8318.3886.091.3946-.3278.8075-1.967.4857-2.3072.4614-3.4364.8136-.0425.0304.0486.0607 1.5482.1457.6618.0364h1.621l3.0175.2247.7892.522.4736.6376-.079.4857-1.2142.6193-1.6393-.3886-3.825-.9107-1.3113-.3279h-.1822v.1093l1.0929 1.0686 2.0035 1.8092 2.5075 2.3314.1275.5768-.3218.4554-.34-.0486-2.2039-1.6575-.85-.7468-1.9246-1.621h-.1275v.17l.4432.6496 2.3436 3.5214.1214 1.0807-.17.3521-.6071.2125-.6679-.1214-1.3721-1.9246L14.38 17.959l-1.1414-1.9428-.1397.079-.674 7.2552-.3156.3703-.7286.2793-.6071-.4614-.3218-.7468.3218-1.4753.3886-1.9246.3157-1.53.2853-1.9004.17-.6314-.0121-.0425-.1397.0182-1.4328 1.9672-2.1796 2.9446-1.7243 1.8456-.4128.164-.7164-.3704.0667-.6618.4008-.5889 2.386-3.0357 1.4389-1.882.929-1.0868-.0062-.1579h-.0546l-6.3385 4.1164-1.1293.1457-.4857-.4554.0608-.7467.2307-.2429 1.9064-1.3114Z"/>
  </g>
  <text x="100" y="150" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="11" fill="#7D8A99">Claude Code</text>

  <!-- ─────────────────────────────────────────────
       NODE 2 — AgentRoute gateway (diamond + star)
  ───────────────────────────────────────────── -->
  <polygon points="290,55 325,90 290,125 255,90"
           fill="#0F1419" stroke="#41D6C3" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- 5-pointed star: center=(290,90), outer R=17, inner r=7 -->
  <polygon points="290,73 294.1,84.3 306.2,84.8 296.7,92.2 300,103.8
                   290,97 280,103.8 283.3,92.2 273.8,84.8 285.9,84.3"
           fill="#41D6C3"/>
  <text x="290" y="150" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="11" fill="#7D8A99">AgentRoute</text>

  <!-- ─────────────────────────────────────────────
       NODE 3 — LiteLLM sidecar (text mark)
  ───────────────────────────────────────────── -->
  <circle cx="480" cy="90" r="35" fill="#0F1419" stroke="#41D6C3" stroke-width="1.5"/>
  <text x="480" y="84" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="12" fill="#41D6C3">Lite</text>
  <text x="480" y="104" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="19" font-weight="bold" fill="#41D6C3">LLM</text>
  <text x="480" y="150" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="11" fill="#7D8A99">LiteLLM</text>

  <!-- ─────────────────────────────────────────────
       NODE 4 — OpenRouter
  ───────────────────────────────────────────── -->
  <circle cx="670" cy="90" r="35" fill="#0F1419" stroke="#41D6C3" stroke-width="1.5"/>
  <!-- OpenRouter icon — Simple Icons 24×24, scaled to 40 px, centered at (670,90) -->
  <g transform="translate(650,70) scale(1.667)" fill="#41D6C3">
    <path d="M16.778 1.844v1.919q-.569-.026-1.138-.032-.708-.008-1.415.037c-1.93.126-4.023.728-6.149 2.237-2.911 2.066-2.731 1.95-4.14 2.75-.396.223-1.342.574-2.185.798-.841.225-1.753.333-1.751.333v4.229s.768.108 1.61.333c.842.224 1.789.575 2.185.799 1.41.798 1.228.683 4.14 2.75 2.126 1.509 4.22 2.11 6.148 2.236.88.058 1.716.041 2.555.005v1.918l7.222-4.168-7.222-4.17v2.176c-.86.038-1.611.065-2.278.021-1.364-.09-2.417-.357-3.979-1.465-2.244-1.593-2.866-2.027-3.68-2.508.889-.518 1.449-.906 3.822-2.59 1.56-1.109 2.614-1.377 3.978-1.466.667-.044 1.418-.017 2.278.02v2.176L24 6.014Z"/>
  </g>
  <text x="670" y="150" text-anchor="middle"
        font-family="'Courier New', Courier, monospace" font-size="11" fill="#7D8A99">OpenRouter</text>
</svg>
