name: Release

on:
  push:
    tags:
      - "v*"
  # Lets a maintainer re-run a release against an existing tag (e.g. after
  # fixing the workflow itself) without deleting and re-pushing the tag.
  # Dispatch with --ref <tag>, e.g. `gh workflow run release.yml --ref v0.1.0`.
  workflow_dispatch: {}

permissions:
  contents: write
  # cosign's keyless "sign-blob" needs Actions' OIDC token to obtain a
  # short-lived signing certificate from Fulcio; without this permission
  # the token isn't issued and the GoReleaser sign step fails.
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo PAT for the homebrew_casks/scoops pushes — see
          # .goreleaser.yaml for why GITHUB_TOKEN alone can't do this.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
