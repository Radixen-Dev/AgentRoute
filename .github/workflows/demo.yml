name: Demo GIFs

on:
  push:
    branches: [main]
    paths:
      - "tapes/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install VHS
        uses: charmbracelet/vhs-action@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build agentroute
        run: go build -o bin/agentroute ./cmd/agentroute

      - name: Render tapes
        run: |
          mkdir -p docs/demo
          for tape in tapes/*.tape; do
            PATH="$PWD/bin:$PATH" vhs "$tape"
          done

      - name: Commit regenerated GIFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo/*.gif
          if ! git diff --cached --quiet; then
            git commit -m "chore(demo): regenerate demo gifs [skip ci]"
            git push
          else
            echo "No demo changes to commit."
          fi
