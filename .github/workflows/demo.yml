name: Demo GIFs

on:
  push:
    branches: [main]
    paths:
      - "tapes/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install VHS
        # charmbracelet/vhs-action's bundled ffmpeg installer has been
        # broken since 2025-03 (charmbracelet/vhs-action#459: it matches a
        # BtbN/FFmpeg-Builds asset-name series that's no longer published,
        # and the fix is still an open, unmerged PR as of this writing).
        # Installing from Charm's own apt repo sidesteps that installer
        # entirely and pulls ffmpeg/ttyd as normal apt dependencies.
        run: |
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/charm.gpg
          echo "deb [signed-by=/usr/share/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ffmpeg ttyd

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build agentroute
        run: go build -o bin/agentroute ./cmd/agentroute

      - name: Render tapes
        run: |
          mkdir -p docs/demo
          for tape in tapes/*.tape; do
            PATH="$PWD/bin:$PATH" vhs "$tape"
          done

      - name: Upload rendered GIFs
        # This workflow is a regression test for the render pipeline
        # (vhs/ffmpeg/ttyd install + the agentroute build + tape syntax),
        # not an auto-publish step: main requires a PR (branch protection),
        # and this repo doesn't grant Actions permission to open PRs, so
        # there's no permission-escalation-free way to land a commit from
        # here. A maintainer regenerates GIFs locally with `make demo` and
        # commits them through the normal PR flow — see CONTRIBUTING.md.
        uses: actions/upload-artifact@v4
        with:
          name: demo-gifs
          path: docs/demo/*.gif
