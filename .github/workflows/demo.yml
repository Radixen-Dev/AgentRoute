name: Demo GIFs

on:
  push:
    branches: [main]
    paths:
      - "tapes/**"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install VHS
        # charmbracelet/vhs-action's bundled ffmpeg installer has been
        # broken since 2025-03 (charmbracelet/vhs-action#459: it matches a
        # BtbN/FFmpeg-Builds asset-name series that's no longer published,
        # and the fix is still an open, unmerged PR as of this writing).
        # Installing from Charm's own apt repo sidesteps that installer
        # entirely and pulls ffmpeg/ttyd as normal apt dependencies.
        run: |
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/charm.gpg
          echo "deb [signed-by=/usr/share/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ffmpeg ttyd

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build agentroute
        run: go build -o bin/agentroute ./cmd/agentroute

      - name: Render tapes
        run: |
          mkdir -p docs/demo
          for tape in tapes/*.tape; do
            PATH="$PWD/bin:$PATH" vhs "$tape"
          done

      - name: Open PR with regenerated GIFs
        # main requires a PR (branch protection), so the bot can't push
        # directly even though it authored the commit — open a PR instead
        # and let the normal review/merge flow pick it up.
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: docs/demo/*.gif
          commit-message: "chore(demo): regenerate demo gifs"
          branch: chore/regenerate-demo-gifs
          title: "chore(demo): regenerate demo gifs"
          body: Automated update from the `tapes/*.tape` VHS scripts.
          delete-branch: true
